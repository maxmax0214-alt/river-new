name: 河川水位データ収集

on:
  schedule:
    # UTC基準。JST 07:00 と 19:00 頃に実行（1日2回・低頻度）
    - cron: "0 22 * * *"   # JST 07:00
    - cron: "0 10 * * *"   # JST 19:00
  workflow_dispatch: {}     # 手動実行ボタンも使えるようにする

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存パッケージをインストール
        run: pip install requests beautifulsoup4 pandas

      - name: 収集スクリプトを実行
        run: python collect_river_levels.py

      - name: 変更があればコミット＆プッシュ
        run: |
          git config user.name "river-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add river_levels.csv
          git diff --staged --quiet || git commit -m "chore: update river_levels.csv"
          git push
